<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: rgba(255,255,255,0.06);
    --accent: #ff3366;
    --accent-glow: rgba(255,51,102,0.3);
    --blue: #3b82f6;
    --green: #22c55e;
    --orange: #f97316;
    --purple: #a855f7;
    --text: #f0f0f5;
    --text2: #a0a0b8;
    --text3: #606078;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === Hero Header === */
  .hero {
    position: relative;
    padding: 48px 20px 32px;
    text-align: center;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    pointer-events: none;
    opacity: 0.4;
  }
  .hero h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, #ff3366 50%, #ff6b9d 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    position: relative;
  }
  .hero .tagline {
    color: var(--text3);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    position: relative;
  }

  /* === Stats Bar === */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 16px 20px;
    position: relative;
  }
  .stat-item {
    text-align: center;
  }
  .stat-num {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }
  .stat-num.total { color: var(--accent); }
  .stat-num.active { color: var(--green); }
  .stat-num.soon { color: var(--orange); }
  .stat-label {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* === Search & Controls === */
  .controls {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px;
  }
  .search-box {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0 16px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .search-box:focus-within {
    border-color: var(--accent);
  }
  .search-box svg {
    width: 18px;
    height: 18px;
    fill: var(--text3);
    flex-shrink: 0;
  }
  .search-box input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-size: 15px;
    padding: 14px 12px;
    outline: none;
    font-family: inherit;
  }
  .search-box input::placeholder {
    color: var(--text3);
  }

  /* === Filters === */
  .filter-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 0 12px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    white-space: nowrap;
  }
  .chip:hover {
    border-color: rgba(255,255,255,0.15);
    background: var(--surface);
  }
  .chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 2px 12px var(--accent-glow);
  }

  /* === View Toggle === */
  .view-toggle {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 16px;
    width: fit-content;
  }
  .view-btn {
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text3);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .view-btn.active {
    background: var(--surface2);
    color: var(--text);
  }

  /* === Event List === */
  .events-wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  .month-group {
    margin-bottom: 28px;
  }
  .month-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 0 12px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 50;
  }
  .month-header h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  .month-count {
    font-size: 12px;
    color: var(--text3);
    background: var(--surface);
    padding: 3px 10px;
    border-radius: 100px;
  }
  .month-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* === Event Card === */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
  }
  .card:hover {
    border-color: rgba(255,255,255,0.1);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .card.status-past {
    opacity: 0.45;
  }
  .card.status-past::before { background: var(--text3); }
  .card.status-now::before { background: var(--green); }
  .card.status-now {
    border-color: rgba(34,197,94,0.2);
    box-shadow: 0 0 20px rgba(34,197,94,0.08);
  }
  .card.status-soon::before { background: var(--orange); }
  .card.status-later::before { background: var(--blue); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.35;
    flex: 1;
  }

  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 100px;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .badge-past { background: var(--surface2); color: var(--text3); }
  .badge-now { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-soon { background: rgba(249,115,22,0.15); color: var(--orange); }
  .badge-later { background: rgba(59,130,246,0.12); color: var(--blue); }

  .card-info {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 16px;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 10px;
  }
  .card-info .info-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .card-info .icon {
    opacity: 0.5;
    font-size: 14px;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 6px;
    background: var(--surface2);
    color: var(--text2);
    letter-spacing: 0.3px;
  }

  /* Expanded details */
  .card-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, margin 0.3s ease;
  }
  .card.expanded .card-detail {
    max-height: 500px;
    margin-top: 14px;
  }
  .detail-inner {
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .card-desc {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.7;
    margin-bottom: 12px;
  }
  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 8px;
    background: rgba(255,51,102,0.08);
    transition: background 0.2s;
  }
  .card-link:hover {
    background: rgba(255,51,102,0.15);
  }

  /* === Calendar Grid View === */
  .cal-grid {
    display: none;
  }
  .cal-grid.active {
    display: block;
  }
  .cal-month-grid {
    margin-bottom: 32px;
  }
  .cal-month-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--text);
  }
  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 8px;
  }
  .cal-day-label {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    padding: 6px 0;
  }
  .cal-cell {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 4px 2px;
    border-radius: 8px;
    font-size: 12px;
    color: var(--text3);
    position: relative;
    min-height: 40px;
  }
  .cal-cell.today {
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
  }
  .cal-cell.has-event {
    cursor: pointer;
  }
  .cal-cell .cal-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 3px;
  }
  .cal-cell .cal-multi {
    display: flex;
    gap: 2px;
    margin-top: 3px;
  }

  /* === Footer === */
  .footer {
    text-align: center;
    padding: 32px 20px;
    font-size: 12px;
    color: var(--text3);
  }
  .footer a {
    color: var(--accent);
    text-decoration: none;
  }

  /* === Empty State === */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
    font-size: 15px;
  }

  /* === Responsive === */
  @media (max-width: 480px) {
    .hero { padding: 36px 16px 24px; }
    .hero h1 { font-size: 26px; }
    .stats-bar { gap: 16px; }
    .stat-num { font-size: 24px; }
    .card { padding: 14px 16px; }
    .card-title { font-size: 15px; }
  }
  @media (min-width: 768px) {
    .hero h1 { font-size: 40px; }
    .hero .tagline { font-size: 15px; }
  }

  /* === Animations === */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card {
    animation: fadeUp 0.4s ease both;
  }
  .month-group:nth-child(2) .card { animation-delay: 0.05s; }
  .month-group:nth-child(3) .card { animation-delay: 0.1s; }
</style>
</head>

// === Utility Functions ===
function getStatus(ev) {
  const start = new Date(ev.start + "T00:00:00+08:00");
  const end = new Date(ev.end + "T23:59:59+08:00");
  if (NOW > end) return "past";
  if (NOW >= start && NOW <= end) return "now";
  const diff = (start - NOW) / (1000*60*60*24);
  if (diff <= 14) return "soon";
  return "later";
}

function fmtDate(s, e) {
  const ds = new Date(s + "T00:00:00");
  const de = new Date(e + "T00:00:00");
  const sm = ds.getMonth()+1, sd = ds.getDate();
  const em = de.getMonth()+1, ed = de.getDate();
  if (s === e) return `${sm}月${sd}日`;
  if (sm === em) return `${sm}月${sd}-${ed}日`;
  return `${sm}月${sd}日 - ${em}月${ed}日`;
}

function daysUntil(dateStr) {
  const d = new Date(dateStr + "T00:00:00+08:00");
  const diff = Math.ceil((d - NOW) / (1000*60*60*24));
  return diff;
}

function monthKey(ev) { return ev.start.substring(0,7); }
function monthLabel(key) {
  const [y,m] = key.split("-");
  const names = ["","一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
  return `${names[parseInt(m)]} ${y}`;
}

// === Filters & State ===
const allCities = [...new Set(EVENTS.map(e => e.city))].sort();
const allTypes = [...new Set(EVENTS.flatMap(e => e.type))].sort();
let activeFilter = "upcoming";
let searchQuery = "";
let currentView = "list";

function getFiltered() {
  let list = EVENTS;

  // Search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(e =>
      e.name.toLowerCase().includes(q) ||
      e.city.toLowerCase().includes(q) ||
      e.location.toLowerCase().includes(q) ||
      e.type.some(t => t.toLowerCase().includes(q)) ||
      e.desc.toLowerCase().includes(q)
    );
  }

  // Filter
  if (activeFilter === "upcoming") {
    list = list.filter(e => getStatus(e) !== "past");
  } else if (activeFilter === "now") {
    list = list.filter(e => getStatus(e) === "now");
  } else if (allCities.includes(activeFilter)) {
    list = list.filter(e => e.city === activeFilter);
  } else if (allTypes.includes(activeFilter)) {
    list = list.filter(e => e.type.includes(activeFilter));
  }

  // Sort by start date
  list.sort((a,b) => a.start.localeCompare(b.start));
  return list;
}

// === Render Stats ===
function renderStats() {
  const total = EVENTS.length;
  const active = EVENTS.filter(e => getStatus(e) !== "past").length;
  const happening = EVENTS.filter(e => getStatus(e) === "now").length;
  document.getElementById("stats-bar").innerHTML = `
    <div class="stat-item"><div class="stat-num total">${total}</div><div class="stat-label">总活动</div></div>
    <div class="stat-item"><div class="stat-num active">${active}</div><div class="stat-label">未过期</div></div>
    <div class="stat-item"><div class="stat-num soon">${happening}</div><div class="stat-label">进行中</div></div>
  `;
}

// === Render Filters ===
function renderFilters() {
  const el = document.getElementById("filters");
  let h = '';
  const filters = [
    {key:"all", label:"全部"},
    {key:"upcoming", label:"未过期"},
    {key:"now", label:"进行中"},
  ];
  allCities.forEach(c => filters.push({key:c, label:c}));
  // Add some popular types
  ["Battle","HipHop","Breaking","Workshop","House","Locking","国际赛"].forEach(t => {
    if (allTypes.includes(t)) filters.push({key:t, label:t});
  });

  filters.forEach(f => {
    h += `<button class="chip ${activeFilter===f.key?'active':''}" onclick="setFilter('${f.key}')">${f.label}</button>`;
  });
  el.innerHTML = h;
}

// === Render List View ===
function renderList() {
  const filtered = getFiltered();
  const container = document.getElementById("list-view");
  document.getElementById("result-count").textContent = `${filtered.length} 个活动`;

  if (!filtered.length) {
    container.innerHTML = '<div class="empty">没有找到匹配的活动</div>';
    return;
  }

  const grouped = {};
  filtered.forEach(ev => {
    const mk = monthKey(ev);
    if (!grouped[mk]) grouped[mk] = [];
    grouped[mk].push(ev);
  });

  let html = '';
  Object.keys(grouped).sort().forEach(mk => {
    const evs = grouped[mk];
    html += `<div class="month-group">
      <div class="month-header">
        <h2>${monthLabel(mk)}</h2>
        <span class="month-count">${evs.length}</span>
        <div class="month-line"></div>
      </div>`;

    evs.forEach(ev => {
      const st = getStatus(ev);
      const badgeMap = {
        past: ["已结束", "badge-past"],
        now: ["进行中", "badge-now"],
        soon: ["即将开始", "badge-soon"],
        later: ["稍后", "badge-later"]
      };
      const [bText, bCls] = badgeMap[st];

      let countdown = '';
      if (st === 'soon') {
        const d = daysUntil(ev.start);
        if (d > 0) countdown = ` · ${d}天后`;
      }

      const linkBtn = ev.link
        ? `<a class="card-link" href="${ev.link}" target="_blank" onclick="event.stopPropagation()">查看详情 &rarr;</a>`
        : '';

      html += `
        <div class="card status-${st}" onclick="this.classList.toggle('expanded')">
          <div class="card-top">
            <div class="card-title">${ev.name}</div>
            <div class="badge ${bCls}">${bText}</div>
          </div>
          <div class="card-info">
            <span class="info-item"><span class="icon">&#128197;</span>${fmtDate(ev.start, ev.end)}${countdown}</span>
            <span class="info-item"><span class="icon">&#128205;</span>${ev.city}</span>
            <span class="info-item"><span class="icon">&#127967;</span>${ev.location}</span>
          </div>
          <div class="card-tags">
            ${ev.type.map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
          <div class="card-detail">
            <div class="detail-inner">
              <div class="card-desc">${ev.desc}</div>
              ${linkBtn}
            </div>
          </div>
        </div>`;
    });

    html += '</div>';
  });

  container.innerHTML = html;
}

// === Render Calendar View ===
function renderCalendar() {
  const filtered = getFiltered();
  const cal = document.getElementById("cal-view");

  // Build event map: date -> [events]
  const dateMap = {};
  filtered.forEach(ev => {
    let cur = new Date(ev.start + "T00:00:00");
    const end = new Date(ev.end + "T00:00:00");
    while (cur <= end) {
      const key = cur.toISOString().substring(0,10);
      if (!dateMap[key]) dateMap[key] = [];
      dateMap[key].push(ev);
      cur.setDate(cur.getDate() + 1);
    }
  });

  // Determine month range
  const months = new Set();
  filtered.forEach(ev => months.add(ev.start.substring(0,7)));
  if (!months.size) {
    // Show current month at least
    months.add(`${NOW.getFullYear()}-${String(NOW.getMonth()+1).padStart(2,'0')}`);
  }
  const sortedMonths = [...months].sort();

  const dayLabels = ["日","一","二","三","四","五","六"];
  let html = '';

  sortedMonths.forEach(mk => {
    const [y,m] = mk.split("-").map(Number);
    const firstDay = new Date(y, m-1, 1).getDay();
    const daysInMonth = new Date(y, m, 0).getDate();
    const mNames = ["","一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];

    html += `<div class="cal-month-grid">
      <div class="cal-month-title">${mNames[m]} ${y}</div>
      <div class="cal-days">`;

    dayLabels.forEach(d => { html += `<div class="cal-day-label">${d}</div>`; });

    // Empty cells before month start
    for (let i = 0; i < firstDay; i++) html += '<div class="cal-cell"></div>';

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const evs = dateMap[dateStr] || [];
      const isToday = TODAY.getFullYear()===y && TODAY.getMonth()===m-1 && TODAY.getDate()===d;
      const cls = [
        'cal-cell',
        isToday ? 'today' : '',
        evs.length ? 'has-event' : ''
      ].filter(Boolean).join(' ');

      let dots = '';
      if (evs.length === 1) dots = '<div class="cal-dot"></div>';
      else if (evs.length > 1) {
        dots = `<div class="cal-multi">${evs.slice(0,3).map(()=>'<div class="cal-dot"></div>').join('')}</div>`;
      }

      const title = evs.map(e=>e.name).join('\n');
      html += `<div class="${cls}" title="${title}"><span>${d}</span>${dots}</div>`;
    }

    html += '</div></div>';
  });

  cal.innerHTML = html;
}

// === Controls ===
function setFilter(f) {
  activeFilter = f;
  renderFilters();
  renderList();
  renderCalendar();
}

function setView(v) {
  currentView = v;
  document.getElementById("btn-list").classList.toggle("active", v==="list");
  document.getElementById("btn-cal").classList.toggle("active", v==="calendar");
  document.getElementById("list-view").style.display = v==="list" ? "block" : "none";
  document.getElementById("cal-view").style.display = v==="calendar" ? "block" : "none";
  document.getElementById("cal-view").classList.toggle("active", v==="calendar");
}

document.getElementById("searchInput").addEventListener("input", function(e) {
  searchQuery = e.target.value.trim();
  renderList();
  renderCalendar();
});
